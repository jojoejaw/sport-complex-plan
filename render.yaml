services:
  # 1. Backend (Express)
  - type: web
    name: sport-complex-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js

  # 2. Frontend (Vite)
  - type: static
    name: sport-complex-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
