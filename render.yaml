services:
  # 1. Backend (Express) - ฟรี
  - type: web
    name: sport-complex-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js

  # 2. Frontend (Vite) - ฟรีอัตโนมัติ
  - type: web
    name: sport-complex-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
